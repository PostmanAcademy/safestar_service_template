$kind: http-request
name: Update Vehicle Profile Upon Scan Completion
url: "{{baseUrl}}/vehicle/:id"
method: PATCH
headers:
  x-mock-response-code: "200"
pathVariables:
  id: "{{vehicleID}}"
body:
  type: json
  content: |-
    {
        "newCode": false
    }
auth:
  type: jwt
  credentials:
    isSecretBase64Encoded: true
    secret: "{{jwtSecret}}"
    algorithm: HS256
    payload: "{}"
    addTokenTo: header
    headerPrefix: Bearer
    queryParamKey: token
    header: "{}"
order: 3000
