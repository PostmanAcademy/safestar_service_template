$kind: http-request
name: Display Custom Safety Message to Driver
url: "{{baseUrl}}/display"
method: GET
body:
  type: json
  content: |-
    {
      "driver": "{{driverID}}",
      "vehicle": "{{vehicleID}}"
    }
auth:
  type: jwt
  credentials:
    isSecretBase64Encoded: true
    secret: "{{jwtSecret}}"
    algorithm: HS256
    payload: "{}"
    addTokenTo: header
    headerPrefix: Bearer
    queryParamKey: token
    header: "{}"
order: 4000
