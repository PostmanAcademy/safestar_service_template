$kind: http-request
name: Poll for Safety Scan Status
url: "{{baseUrl}}/run/:id"
method: GET
pathVariables:
  id: "{{safetyScanID}}"
auth:
  type: jwt
  credentials:
    isSecretBase64Encoded: true
    secret: "{{jwtSecret}}"
    algorithm: HS256
    payload: "{}"
    addTokenTo: header
    headerPrefix: Bearer
    queryParamKey: token
    header: "{}"
scripts:
  - type: afterResponse
    code: |-
      if(pm.response.json().status === "QUEUED") {
          pm.execution.setNextRequest('Poll for Safety Scan Status');
      }
    language: text/javascript
order: 2000
