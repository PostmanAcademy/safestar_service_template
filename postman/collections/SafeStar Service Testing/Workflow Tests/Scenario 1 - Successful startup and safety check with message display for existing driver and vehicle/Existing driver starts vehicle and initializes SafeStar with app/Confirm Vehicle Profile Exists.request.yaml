$kind: http-request
name: Confirm Vehicle Profile Exists
url: "{{baseUrl}}/vehicle/:id"
method: GET
pathVariables:
  id: "{{vehicleID}}"
auth:
  type: jwt
  credentials:
    isSecretBase64Encoded: true
    secret: "{{jwtSecret}}"
    algorithm: HS256
    payload: "{}"
    addTokenTo: header
    headerPrefix: Bearer
    queryParamKey: token
    header: "{}"
order: 2000
