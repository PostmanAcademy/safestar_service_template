$kind: http-request
name: Diagnostic report sent successfully
url: "{{baseUrl}}/diagnostics/send/:id"
method: POST
headers:
  x-mock-response-code: "204"
pathVariables:
  id: "{{diagnosticRunID}}"
auth:
  type: jwt
  credentials:
    isSecretBase64Encoded: true
    secret: "{{jwtSecret}}"
    algorithm: HS256
    payload: "{}"
    addTokenTo: header
    headerPrefix: Bearer
    queryParamKey: token
    header: "{}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
    language: text/javascript
order: 3000
